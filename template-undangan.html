<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f8f5f2;
color:#444;
text-align:center;
overflow-x:hidden;
overflow-y:hidden;
}

/* cover */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486");
background-size:cover;
color:white;
position:relative;
overflow:hidden;
}

/* animasi teks */

.hero h1{
font-size:48px;
animation:fadeUp 2s ease;
}

.hero p{
animation:fadeUp 2.5s ease;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
background:#c9a96e;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:20px;
animation:fadeUp 3s ease;
}

/* bunga */

.flower{
position:absolute;
top:-50px;
font-size:20px;
animation:fall linear infinite;
opacity:0.8;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* section */

section{
padding:60px 20px;
}

.nama{
font-size:40px;
color:#c9a96e;
margin:20px 0;
}

.hidden{
display:none;
}

</style>
</head>

<body>


<div class="hero" id="cover">

<p>Undangan Pernikahan</p>
<h1>Arka & Livia</h1>

<p>Kepada Yth.</p>
<p>Bapak / Ibu / Saudara</p>

<button onclick="openInvite()">Buka Undangan</button>

</div>


<div id="content" class="hidden">

<section>

<h2>Assalamu’alaikum Warahmatullahi Wabarakatuh</h2>

<p>
Dengan memohon rahmat Tuhan Yang Maha Esa,
kami bermaksud menyelenggarakan pernikahan:
</p>

<div class="nama">Arka Mahendra</div>

<div class="nama">&</div>

<div class="nama">Livia Prameswari</div>

</section>

</div>


<script>

/* buka undangan */

function openInvite(){

document.getElementById("cover").style.display="none";
document.getElementById("content").classList.remove("hidden");
document.body.style.overflowY="auto";
document.documentElement.style.overflowY="auto";
window.scrollTo(0,0);

}

/* bunga jatuh */

function createFlower(){

const flower = document.createElement("div");

flower.classList.add("flower");

flower.innerHTML = "🌸";

flower.style.left = Math.random()*100 + "vw";

flower.style.animationDuration = (5 + Math.random()*5) + "s";

flower.style.fontSize = (10 + Math.random()*20) + "px";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},10000);

}

setInterval(createFlower,300);

</script>

</body>
</html>
